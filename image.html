<!DOCTYPE html>
<html>
<head>
  <title>Overlapping Images Hover Effect</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: Arial;
    }

    .container {
      position: relative;
      width: 600px;
      height: 300px;
    }

    .img-box {
      position: absolute;
      width: 200px;
      height: 200px;
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlapping positions */
    .img1 { left: 0; top: 50px; z-index: 1; }
    .img2 { left: 150px; top: 30px; z-index: 2; }
    .img3 { left: 300px; top: 50px; z-index: 3; }

    /* Hover effect */
    .img-box:hover {
      transform: scale(1.3);
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="img-box img1">
    <img src="https://picsum.photos/id/1015/300/300">
  </div>

  <div class="img-box img2">
    <img src="https://picsum.photos/id/1025/300/300">
  </div>

  <div class="img-box img3">
    <img src="https://picsum.photos/id/1035/300/300">
  </div>
</div>


</body>
</html>
