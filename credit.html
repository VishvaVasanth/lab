<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        .container {
            max-width: 500px;
        }
        input {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
        }
        button {
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>Products</h2>

    <label><input type="checkbox" value="100" class="product"> Product-A : 100</label><br>
    <label><input type="checkbox" value="200" class="product"> Product-B : 200</label><br>
    <label><input type="checkbox" value="300" class="product"> Product-C : 300</label><br> 

    <h2>Total : Rs.<span id="total">0</span></h2>

    <form id="paymentform">
        <input type="text" id="Cardnumber" placeholder="Enter card number (16 digits)" required>
        <input type="text" id="expiry" placeholder="MM/YY" required>
        <input type="text" id="cvv" placeholder="CVV" required>

        <button type="submit">Pay Now</button>
    </form>

    <p id="message"></p>

</div>

<script>
    const products = document.querySelectorAll('.product');
    const totalDisplay = document.getElementById('total');

    // Calculate total
    products.forEach(p => {
        p.addEventListener('change', calculateTotal);
    });

    function calculateTotal() {
        let total = 0;

        products.forEach(p => {
            if (p.checked) {
                total += parseInt(p.value);
            }
        });

        totalDisplay.innerText = total;
    }

    // Form submit
    document.getElementById('paymentform').addEventListener('submit', function(e){
        e.preventDefault();

        const cardnumber = document.getElementById('Cardnumber').value;
        const expiry = document.getElementById('expiry').value;
        const cvv = document.getElementById('cvv').value;
        const total = totalDisplay.innerText;

        // ✅ Check at least one product selected
        let isChecked = false;
        products.forEach(p => {
            if (p.checked) isChecked = true;
        });

        if (!isChecked) {
            alert('Please select at least one product');
            return;
        }

        // ✅ Card validation
        if(!/^\d{16}$/.test(cardnumber)){
            alert('Invalid card number');
            return;
        }

        // ✅ Expiry format
        if(!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)){
            alert('Invalid expiry date');
            return;
        }

        // ✅ Expiry must be future
        const [month, year] = expiry.split('/');
        const currentDate = new Date();

        const currentMonth = currentDate.getMonth() + 1;
        const currentYear = currentDate.getFullYear() % 100;

        const expMonth = parseInt(month);
        const expYear = parseInt(year);

        if (
            expYear < currentYear ||
            (expYear === currentYear && expMonth < currentMonth)
        ) {
            alert('Card is expired');
            return;
        }

        // ✅ CVV validation
        if(!/^\d{3}$/.test(cvv)){
            alert('Invalid CVV');
            return;
        }

        // Data object
        const data = {
            cardNumber: cardnumber,
            expiry,
            cvv,
            total
        };

        // AJAX request
        fetch('https://jsonplaceholder.typicode.com/posts', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('message').innerText = 'Payment Successful!';
            document.getElementById('paymentform').reset();
            totalDisplay.innerText = 0;
        })
        .catch(() => {
            document.getElementById('message').innerText = 'Payment Failed!';
        });

    });
</script>

</body>
</html>
